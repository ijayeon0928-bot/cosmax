<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모박스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@700;800&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{
    --paper: #FBF5E1;
    --surface: #FFFEF9;
    --surface-2: #F5EBC8;
    --ink: #3B2F18;
    --ink-soft: #7C6C46;
    --line: #E8DBA9;
    --accent: #C0922E;
    --accent-strong: #A47A20;
    --accent-soft: #F1E2B4;
    --danger: #A65A3D;
    --shadow: 0 10px 28px rgba(87,66,20,0.08);
    --shadow-sm: 0 2px 8px rgba(87,66,20,0.08);
    --font-title: 'Gothic A1', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    --font-body: 'IBM Plex Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    --font-mono: 'IBM Plex Mono', 'Malgun Gothic', ui-monospace, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper: #211a0e;
      --surface: #2b2314;
      --surface-2: #352b18;
      --ink: #F3E8C9;
      --ink-soft: #B7A578;
      --line: #43371f;
      --accent: #E0B65C;
      --accent-strong: #EFC983;
      --accent-soft: #3d3018;
      --danger: #DD8A69;
      --shadow: 0 10px 30px rgba(0,0,0,0.45);
      --shadow-sm: 0 2px 10px rgba(0,0,0,0.4);
    }
  }
  :root[data-theme="dark"]{
    --paper: #211a0e; --surface:#2b2314; --surface-2:#352b18; --ink:#F3E8C9; --ink-soft:#B7A578;
    --line:#43371f; --accent:#E0B65C; --accent-strong:#EFC983; --accent-soft:#3d3018;
    --danger:#DD8A69; --shadow:0 10px 30px rgba(0,0,0,0.45); --shadow-sm:0 2px 10px rgba(0,0,0,0.4);
  }
  :root[data-theme="light"]{
    --paper: #FBF5E1; --surface:#FFFEF9; --surface-2:#F5EBC8; --ink:#3B2F18; --ink-soft:#7C6C46;
    --line:#E8DBA9; --accent:#C0922E; --accent-strong:#A47A20; --accent-soft:#F1E2B4;
    --danger:#A65A3D; --shadow:0 10px 28px rgba(87,66,20,0.08); --shadow-sm:0 2px 8px rgba(87,66,20,0.08);
  }

  * { box-sizing: border-box; }
  html{ -webkit-text-size-adjust: 100%; }
  body{
    margin:0;
    font-family: var(--font-body);
    background-color: var(--paper);
    background-image: radial-gradient(var(--line) 1px, transparent 1.5px);
    background-size: 24px 24px;
    color: var(--ink);
    padding-bottom: 60px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
  button:focus-visible, input:focus-visible, textarea:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  svg{ display:block; }

  header{
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    padding: 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner{
    max-width: 760px;
    margin: 0 auto;
  }
  .eyebrow{
    display:block;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .16em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  header h1{
    margin:0;
    font-family: var(--font-title);
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-wrap: balance;
  }

  .container{
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 16px;
  }

  /* input card */
  .add-card{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 22px 22px 20px;
    margin-bottom: 28px;
  }
  .add-card .section-label{ margin-top: 0; }
  textarea{
    width:100%;
    min-height: 84px;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    padding: 4px 2px 12px;
    font-size: 15px;
    line-height: 1.6;
    font-family: var(--font-body);
    color: var(--ink);
    resize: vertical;
    outline: none;
  }
  textarea::placeholder{ color: var(--ink-soft); }
  textarea:focus{ border-bottom-color: var(--accent); }

  .keyword-input{
    width:100%;
    padding: 9px 2px;
    border: none;
    border-bottom: 1px dashed var(--line);
    background: transparent;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink);
    outline: none;
    margin-top: 4px;
  }
  .keyword-input::placeholder{ color: var(--ink-soft); }
  .keyword-input:focus{ border-bottom-color: var(--accent); border-bottom-style: solid; }

  .hashtag-chip{
    display:inline-flex;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-strong);
    background: var(--accent-soft);
    padding: 2px 8px;
    border-radius: 5px;
  }

  .tag-picker{
    display:flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0 4px;
  }
  .tag-chip{
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 8px;
    background: var(--surface);
    border: 1.5px solid var(--line);
    color: var(--ink-soft);
    cursor: pointer;
    transition: background .12s ease, color .12s ease, border-color .12s ease, box-shadow .12s ease, transform .08s ease;
  }
  .tag-chip:hover{ border-color: var(--accent); color: var(--ink); }
  .tag-chip.active{
    color:#fff;
    border-color: transparent;
    box-shadow: var(--shadow-sm);
  }
  .tag-chip:active{ transform: scale(.97); }

  .preview-wrap{
    position: relative;
    display:inline-block;
    margin: 16px 0 4px;
  }
  .preview-wrap img{
    width: 84px; height: 84px;
    object-fit: cover;
    border: 4px solid var(--surface-2);
    border-radius: 8px;
    box-shadow: var(--shadow-sm);
    transform: rotate(-3deg);
    display:block;
  }
  .preview-remove{
    position:absolute;
    top:-9px; right:-9px;
    background: var(--danger);
    color:#fff;
    border:none;
    border-radius:50%;
    width:20px; height:20px;
    font-size:12px;
    line-height:1;
    cursor:pointer;
  }
  .ocr-btn{
    display:block;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-strong);
    background: var(--accent-soft);
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .ocr-btn:disabled{ opacity: .6; cursor: default; }

  .add-row{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 18px;
  }
  .photo-actions{
    display:flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .img-upload-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);
    border: 1.5px solid var(--line);
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    background: var(--surface);
    transition: border-color .12s ease, color .12s ease;
  }
  .img-upload-btn:hover{ border-color: var(--accent); color: var(--accent-strong); }
  input[type="file"]{ display:none; }

  .save-btn{
    font-family: var(--font-mono);
    background: var(--accent);
    color: var(--surface);
    border:none;
    border-radius: 8px;
    padding: 11px 26px;
    font-size: 14px;
    font-weight: 700;
    cursor:pointer;
    box-shadow: var(--shadow-sm);
    transition: background .12s ease, transform .08s ease;
  }
  .save-btn:hover{ background: var(--accent-strong); }
  .save-btn:active{ transform: scale(.96); }

  /* dashboard stats */
  .stats-row{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
    gap: 10px;
    margin-bottom: 8px;
  }
  .stat-tile{
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 4px solid var(--tile-color, var(--line));
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    text-align: left;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .stat-tile:hover{ box-shadow: var(--shadow-sm); transform: translateY(-2px); }
  .stat-num{
    display:block;
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat-label{
    display:block;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  /* toolbar */
  .toolbar{
    margin: 20px 0 8px;
  }
  .search-input{
    width:100%;
    padding: 10px 4px;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    outline:none;
  }
  .search-input::placeholder{ color: var(--ink-soft); }
  .search-input:focus{ border-bottom-color: var(--accent); }

  .section-label{
    display:flex;
    align-items:center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    color: var(--ink-soft);
    margin: 30px 0 14px;
  }
  .section-label::after{
    content:'';
    flex:1;
    height:1px;
    background: var(--line);
  }
  .section-label-row{
    display:flex;
    align-items:center;
    gap: 10px;
    margin: 30px 0 14px;
  }
  .section-label-row .label-text{
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .section-label-row .rule{
    flex:1;
    height:1px;
    background: var(--line);
  }
  .mini-action-btn{
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--danger);
    background: none;
    border: 1.5px solid var(--danger);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* meeting groups */
  .meeting-groups, .todo-list, .dense-list, .memo-list{
    display:flex;
    flex-direction: column;
    gap: 12px;
  }
  .meeting-group{
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 4px solid var(--tag-color, var(--line));
    border-radius: 12px;
    padding: 14px 16px;
  }
  .meeting-group-header{
    display:flex;
    align-items:baseline;
    gap: 8px;
    margin-bottom: 8px;
  }
  .meeting-group-title{
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 13px;
    color: var(--accent-strong);
  }
  .meeting-group-count{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    margin-left: auto;
  }
  .meeting-lines{
    display:flex;
    flex-direction: column;
  }
  .meeting-line{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    padding: 4px 0;
    cursor: pointer;
  }
  .line-text{
    flex:1;
    min-width:0;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--ink);
  }
  .meeting-line:hover .line-text{ color: var(--accent-strong); }
  .line-date{
    flex-shrink:0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
  }
  .meeting-more{
    margin-top: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-strong);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  /* todo checklist */
  .todo-row{
    display:flex;
    align-items:center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .todo-checkbox{
    width: 18px; height: 18px;
    flex-shrink: 0;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .todo-text-wrap{
    flex:1;
    min-width: 0;
    cursor: pointer;
  }
  .todo-text{
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .todo-row.done .todo-text{
    text-decoration: line-through;
    color: var(--ink-soft);
  }
  .todo-date{
    flex-shrink:0;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
  }

  /* dense list (처방정보 / 실험결과) */
  .dense-row{
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 4px solid var(--tag-color, var(--line));
    border-radius: 10px;
    overflow: hidden;
  }
  .dense-row-head{
    display:flex;
    align-items:center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
  }
  .dense-preview{
    flex:1;
    min-width: 0;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dense-chevron{
    flex-shrink:0;
    color: var(--ink-soft);
    transition: transform .15s ease;
  }
  .dense-row.expanded .dense-chevron{ transform: rotate(90deg); }
  .dense-detail{ display:none; padding: 0 14px 14px; border-top: 1px solid var(--line); }
  .dense-row.expanded .dense-detail{ display:block; padding-top: 12px; }
  .dense-detail-text{
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink);
    white-space: pre-wrap;
    margin-bottom: 10px;
  }
  .dense-detail-img{
    max-width: 160px;
    border-radius: 6px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 10px;
    display:block;
  }
  .dense-keywords{
    display:flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .dense-detail-actions{
    display:flex;
    justify-content: flex-end;
  }

  /* memo card (기타) */
  .memo-card{
    display:flex;
    align-items: stretch;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .memo-card:hover{ box-shadow: var(--shadow); transform: translateY(-2px); }
  .card-stripe{
    width: 5px;
    flex-shrink: 0;
    background: var(--tag-color, var(--line));
  }
  .card-body{
    flex:1;
    min-width: 0;
    padding: 14px 16px;
  }
  .card-top{
    display:flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 9px;
    flex-wrap: wrap;
  }
  .entry-no, .card-date{
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink-soft);
  }
  .card-tag-badge{
    display:inline-flex;
    align-items:center;
    font-family: var(--font-mono);
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--ink);
  }
  .card-date{ margin-left: auto; }
  .memo-text{
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink);
    white-space: pre-wrap;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .card-thumb{
    width: 46px; height: 46px;
    object-fit: cover;
    border: 3px solid var(--surface-2);
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(59,47,24,0.15);
    transform: rotate(-2deg);
    margin-top: 8px;
    display: block;
  }

  .empty-state{
    text-align:center;
    color: var(--ink-soft);
    padding: 40px 20px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
  }
  #emptyBanner{ padding: 60px 20px; }

  /* modal */
  .modal-overlay{
    display:none;
    position: fixed;
    inset:0;
    background: rgba(59,47,24,0.45);
    z-index: 100;
    align-items:flex-end;
    justify-content:center;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background: var(--surface);
    width:100%;
    max-width: 600px;
    border-radius: 16px 16px 0 0;
    border-top: 4px solid var(--tag-color, var(--accent));
    padding: 22px 22px 20px;
    max-height: 85vh;
    overflow-y:auto;
  }
  @media (min-width: 640px){
    .modal-overlay{ align-items:center; }
    .modal-box{ border-radius: 14px; }
  }
  .modal-header{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-bottom: 14px;
  }
  .modal-tags{
    display:flex;
    align-items:center;
    gap:10px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }
  #modalEntryNo{ font-weight: 500; font-variant-numeric: tabular-nums; }
  .modal-close{
    background:none;
    border:none;
    font-size: 22px;
    line-height:1;
    cursor:pointer;
    color: var(--ink-soft);
  }
  .modal-close:hover{ color: var(--ink); }

  .modal-img-wrap{
    position: relative;
    width: fit-content;
    margin: 10px auto 26px;
  }
  .modal-img-wrap::before{
    content:'';
    position:absolute;
    top:-11px; left:50%;
    width: 68px; height: 22px;
    background: linear-gradient(90deg, rgba(192,146,46,.30), rgba(192,146,46,.48));
    transform: translateX(-50%) rotate(-4deg);
    box-shadow: 0 1px 3px rgba(59,47,24,.18);
  }
  .modal-img{
    display:block;
    max-width: 100%;
    max-height: 46vh;
    border: 6px solid var(--surface-2);
    border-radius: 6px;
    box-shadow: var(--shadow);
    transform: rotate(-1.4deg);
  }
  .modal-text{
    white-space: pre-wrap;
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    margin-bottom: 14px;
  }
  #modalKeywords{ margin-bottom: 14px; }
  .modal-date{
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 20px;
    font-variant-numeric: tabular-nums;
  }
  .modal-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
  }
  .btn-secondary, .btn-danger{
    font-family: var(--font-mono);
    font-weight: 600;
    border-radius: 8px;
    padding: 9px 18px;
    font-size:13px;
    cursor:pointer;
    background: var(--surface);
  }
  .btn-secondary{
    border:1.5px solid var(--line);
    color: var(--ink);
  }
  .btn-danger{
    border:1.5px solid var(--danger);
    color: var(--danger);
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="eyebrow">R&amp;D FIELD LOG</span>
    <h1>메모박스</h1>
  </div>
</header>

<div class="container">

  <div class="add-card">
    <div class="section-label">새 메모</div>
    <textarea id="memoInput" placeholder="메모를 입력하세요..."></textarea>

    <div class="tag-picker" id="tagPicker"></div>

    <input type="text" id="keywordInput" class="keyword-input" placeholder="키워드 (공백으로 구분, 예: 저자극크림 나이아신아마이드)">

    <div id="previewArea"></div>

    <div class="add-row">
      <div class="photo-actions">
        <button type="button" class="img-upload-btn" id="cameraBtn">

  function seedSampleData(){
    const seeded = SAMPLE_NOTES.map(s => ({
      id: 'seed_' + Math.random().toString(36).slice(2, 9),
      entryNo: nextEntryNo(),
      text: s.text,
      image: null,
      tag: s.tag,
      keywords: s.keywords || [],
      done: false,
      createdAt: s.date
    }));
    saveNotes(seeded.slice().reverse().concat(loadNotes()));
    renderAll();
  }

  let selectedTag = '기타';
  let pendingImage = null;
  let searchTerm = '';

  function loadNotes(){
    try{
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }catch(e){
      return [];
    }
  }
  function saveNotes(notes){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  function migrateEntryNumbers(notes){
    const hasMissing = notes.some(n => !n.entryNo);
    if(!hasMissing) return notes;
    let counter = parseInt(localStorage.getItem(COUNTER_KEY) || '0', 10);
    for(let i = notes.length - 1; i >= 0; i--){
      if(!notes[i].entryNo){
        counter += 1;
        notes[i].entryNo = counter;
      }
    }
    localStorage.setItem(COUNTER_KEY, String(counter));
    saveNotes(notes);
    return notes;
  }

  function nextEntryNo(){
    const counter = parseInt(localStorage.getItem(COUNTER_KEY) || '0', 10) + 1;
    localStorage.setItem(COUNTER_KEY, String(counter));
    return counter;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function matchesSearch(n){
    if(!searchTerm) return true;
    const hay = ((n.text || '') + ' ' + (n.keywords || []).join(' ')).toLowerCase();
    return hay.includes(searchTerm);
  }

  function keywordChips(keywords){
    if(!keywords || keywords.length === 0) return '';
    return keywords.map(k => `<span class="hashtag-chip">#${escapeHtml(k)}</span>`).join('');
  }

    tagPicker.querySelectorAll('.tag-chip').forEach(chip => {
      const info = tagInfo(chip.dataset.tag);
      const isActive = chip.dataset.tag === selectedTag;
      chip.classList.toggle('active', isActive);
      chip.style.background = isActive ? info.solid : '';
    });
  }
  tagPicker.addEventListener('click', (e) => {

    refreshPickerState();

    if(el) el.scrollIntoView({ behavior, block: 'start' });

  // ---- image processing (shared by camera + gallery) ----
  function processImageFile(file){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const maxW = 800;
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        pendingImage = canvas.toDataURL('image/jpeg', 0.7);
        renderPreview();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  const galleryInput = document.getElementById('galleryInput');
  const cameraInput = document.getElementById('cameraInput');
  const previewArea = document.getElementById('previewArea');

  cameraInput.addEventListener('change', (e) => processImageFile(e.target.files[0]));

  function renderPreview(){
    if(!pendingImage){ previewArea.innerHTML = ''; return; }
    previewArea.innerHTML = `

    document.getElementById('removePreview').addEventListener('click', () => {
      pendingImage = null;
      galleryInput.value = '';
      cameraInput.value = '';
      renderPreview();
    });
    document.getElementById('ocrBtn').addEventListener('click', runOcr);
  }

  // ---- OCR (Tesseract.js — 브라우저에서 무료로 동작, API 키/서버 불필요) ----
  async function runOcr(){
    if(!pendingImage) return;

    const btn = document.getElementById('ocrBtn');
    const originalLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = '추출 중... 0%';

    try{
      const result = await Tesseract.recognize(pendingImage, 'kor+eng', {
        logger: (m) => {
          if(m.status === 'recognizing text' && typeof m.progress === 'number'){
            btn.textContent = `추출 중... ${Math.round(m.progress * 100)}%`;
          }
        }
      });

      const extracted = (result.data.text || '').trim();
      if(!extracted){
        alert('이미지에서 텍스트를 찾지 못했습니다.');
        return;
      }

      const memoInput = document.getElementById('memoInput');
      memoInput.value = memoInput.value.trim() ? memoInput.value.trim() + '\n' + extracted : extracted;
      memoInput.focus();
    }catch(err){
      alert('OCR 실패: ' + err.message);
    }finally{
      btn.disabled = false;
      btn.textContent = originalLabel;
    }
  }

  // ---- save ----
  const keywordInput = document.getElementById('keywordInput');
  document.getElementById('saveBtn').addEventListener('click', () => {
    const text = document.getElementById('memoInput').value.trim();
    if(!text && !pendingImage){
      alert('텍스트나 이미지를 입력해주세요.');
      return;
    }
    const keywords = keywordInput.value.trim()
      .split(/\s+/)
      .map(k => k.replace(/^#/, '').trim())
      .filter(Boolean);

    const notes = loadNotes();
    notes.unshift({
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 8),
      entryNo: nextEntryNo(),
      text,
      image: pendingImage,
      tag: selectedTag,
      keywords,
      done: false,
      createdAt: new Date().toLocaleString('ko-KR')
    });
    saveNotes(notes);

    document.getElementById('memoInput').value = '';
    keywordInput.value = '';
    pendingImage = null;
    galleryInput.value = '';
    cameraInput.value = '';
    renderPreview();

    renderAll();
  });

  // ---- 회의록: 키워드별 그룹화 ----
  const meetingGroupsEl = document.getElementById('meetingGroups');

  function groupMeetings(notes){
    const groups = {};
    notes.filter(matchesSearch).forEach(n => {
      const key = (n.keywords && n.keywords[0]) ? n.keywords[0] : '미분류';
      if(!groups[key]) groups[key] = [];
      groups[key].push(n);
    });
    Object.values(groups).forEach(arr => arr.sort((a, b) => (b.entryNo || 0) - (a.entryNo || 0)));
    return Object.entries(groups)
      .map(([key, items]) => ({ key, items }))
      .sort((a, b) => (b.items[0].entryNo || 0) - (a.items[0].entryNo || 0));
  }

  function meetingLineHtml(n){
    return `<div class="meeting-line" data-id="${n.id}">
      <span class="line-text">${escapeHtml(n.text || '(이미지 메모)')}</span>
      <span class="line-date">${n.createdAt}</span>
    </div>`;
  }

  function renderMeetingSection(notes){
    const groups = groupMeetings(notes);
    if(groups.length === 0){
      meetingGroupsEl.innerHTML = `<div class="empty-state">${notes.length === 0 ? '기록된 회의록이 없습니다' : '검색 결과가 없습니다'}</div>`;
      return;
    }
    const info = tagInfo('회의록');
    meetingGroupsEl.innerHTML = groups.map((g, gi) => {
      const visible = g.items.slice(0, 2);
      const rest = g.items.length - visible.length;
      return `
        <div class="meeting-group" style="--tag-color:${info.solid}">
          <div class="meeting-group-header">
            <span class="meeting-group-title">${g.key === '미분류' ? '미분류' : '#' + escapeHtml(g.key)}</span>
            <span class="meeting-group-count">${g.items.length}건</span>
          </div>
          <div class="meeting-lines" data-group-index="${gi}">
            ${visible.map(meetingLineHtml).join('')}
          </div>
          ${rest > 0 ? `<button type="button" class="meeting-more" data-group-index="${gi}">+${rest}개 더보기</button>` : ''}
        </div>
      `;
    }).join('');

    meetingGroupsEl.querySelectorAll('.meeting-line').forEach(line => {
      line.addEventListener('click', () => openModal(line.dataset.id));

    meetingGroupsEl.querySelectorAll('.meeting-more').forEach(btn => {

        });

  // ---- TODO: 체크리스트 ----
  const todoListEl = document.getElementById('todoList');

  function renderTodoSection(notes){
    const filtered = notes.filter(matchesSearch);
    if(filtered.length === 0){
      todoListEl.innerHTML = `<div class="empty-state">${notes.length === 0 ? '등록된 할 일이 없습니다' : '검색 결과가 없습니다'}</div>`;
    }else{
      const sorted = filtered.slice().sort((a, b) => {
        const da = a.done === true, db = b.done === true;
        if(da !== db) return da ? 1 : -1;
        return (b.entryNo || 0) - (a.entryNo || 0);
      });
      todoListEl.innerHTML = sorted.map(n => `
        <div class="todo-row ${n.done ? 'done' : ''}">
          <input type="checkbox" class="todo-checkbox" ${n.done ? 'checked' : ''} data-id="${n.id}">

    const notes = loadNotes();

    const info = tagInfo('기타');
    miscListEl.innerHTML = filtered.map(n => `
      <div class="memo-card" data-id="${n.id}" style="--tag-color:${info.solid}">
        <div class="card-stripe"></div>
        <div class="card-body">
          <div class="card-top">
            <span class="entry-no">No. ${String(n.entryNo || 0).padStart(3, '0')}</span>
            <span class="card-date">${n.createdAt}</span>
          </div>
          ${n.text ? `<div class="memo-text">${escapeHtml(n.text)}</div>` : ''}
          ${n.keywords && n.keywords.length ? `<div class="dense-keywords">${keywordChips(n.keywords)}</div>` : ''}
          ${n.image ? `<img class="card-thumb" src="${n.image}">` : ''}
        </div>
      </div>
    `).join('');
    miscListEl.querySelectorAll('.memo-card').forEach(card => {
      card.addEventListener('click', () => openModal(card.dataset.id));
    });
  }

  // ---- 전체 렌더 진입점 ----
  const emptyBanner = document.getElementById('emptyBanner');
  const sectionsWrap = document.getElementById('sectionsWrap');

  function renderAll(){
    const allNotes = migrateEntryNumbers(loadNotes());
    renderStats(allNotes);

    if(allNotes.length === 0){
      emptyBanner.style.display = 'block';
      sectionsWrap.style.display = 'none';
      return;
    }
    emptyBanner.style.display = 'none';
    sectionsWrap.style.display = 'block';

    renderMeetingSection(allNotes.filter(n => n.tag === '회의록'));
    renderTodoSection(allNotes.filter(n => n.tag === 'TODO'));
    renderDenseSection('처방정보', allNotes.filter(n => n.tag === '처방정보'), 'prescriptionList');
    renderDenseSection('실험결과', allNotes.filter(n => n.tag === '실험결과'), 'experimentList');
    renderMiscSection(allNotes.filter(n => n.tag === '기타'));
  }

  document.getElementById('seedBtn').addEventListener('click', seedSampleData);

  // ---- modal ----
  const modalOverlay = document.getElementById('modalOverlay');
  const modalBox = document.getElementById('modalBox');
  const modalTagLabel = document.getElementById('modalTagLabel');
  const modalEntryNo = document.getElementById('modalEntryNo');
  const modalImgWrap = document.getElementById('modalImgWrap');
  const modalImg = document.getElementById('modalImg');
  const modalText = document.getElementById('modalText');
  const modalKeywords = document.getElementById('modalKeywords');
  const modalDate = document.getElementById('modalDate');
  const modalDelete = document.getElementById('modalDelete');
  let currentModalId = null;

  function openModal(id){
    const notes = loadNotes();
    const note = notes.find(n => n.id === id);
    if(!note) return;
    currentModalId = id;

    const info = tagInfo(note.tag);
    modalBox.style.setProperty('--tag-color', info.solid);
    modalTagLabel.innerHTML = `<span class="card-tag-badge" style="background:${info.tint}">${info.label}</span>`;
    modalEntryNo.textContent = `No. ${String(note.entryNo || 0).padStart(3, '0')}`;
    modalText.textContent = note.text || '';
    modalKeywords.innerHTML = keywordChips(note.keywords);
    modalDate.textContent = note.createdAt;

    if(note.image){
      modalImg.src = note.image;
      modalImgWrap.style.display = 'block';
    }else{
      modalImgWrap.style.display = 'none';
    }

    modalOverlay.classList.add('open');
  }

  function closeModal(){
    modalOverlay.classList.remove('open');
    currentModalId = null;
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if(e.target === modalOverlay) closeModal();
  });

  modalDelete.addEventListener('click', () => {
    if(!currentModalId) return;
    if(!confirm('이 메모를 삭제할까요?')) return;
    let notes = loadNotes();
    notes = notes.filter(n => n.id !== currentModalId);
    saveNotes(notes);
    closeModal();
    renderAll();
  });

  // ---- init ----
  renderPreview();
  renderAll();
</script>
</body>
</html>
